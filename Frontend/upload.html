<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Guide Quiz Game</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
        }

        .view {
            display: none;
        }

        .active {
            display: block;
        }

        .upload-container {
            border: 2px dashed #007bff;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }

        button:hover {
            background: #0056b3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #file-info {
            margin-top: 10px;
            font-weight: bold;
            color: #2b6cb0;
        }

        /* Approval Screen Styling */

        .question-item {
            border: 1px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            background: #fff;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 6px;
        }

        /*.options-list { font-size: 14px; color: #4a5568; list-style-type: none; padding-left: 0; }*/
    </style>
</head>

<body>

    <!-- VIEW 1: UPLOAD SCREEN -->
    <div id="uploadView" class="view active">
        <h2>📚 Upload Your Study Guide</h2>
        <p>Upload your PDF or Word document to generate a 25-question custom game.</p>

        <input type="file" id="fileInput" accept=".pdf,.docx" style="display: none;">
        <div class="upload-container" id="dropZone">
            <p>Drag & drop your file here, or <strong>click to browse</strong></p>
            <div id="file-info"></div>
        </div>

        <button id="generateBtn">Generate 25 Questions</button>
    </div>

    <!-- VIEW 2: APPROVAL SCREEN -->
    <div id="approvalView" class="view">
        <h2>Here are all of your questions</h2>


        <div id="questionsContainer"></div>

        <button id="startGameBtn">Start Game with Approved Questions</button>
    </div>

    <script src="app.js"></script>
</body>

</html>
